<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Domus Prime</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #0a0a0a;
    color: #fff;
    font-family: 'Inter', sans-serif;
}

.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.95)),
    url('https://images.unsplash.com/photo-1600607687939-ce8a6c25118c') center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

.hero h1 {
    font-size:55px;
    color:#c9a85d;
}

.btn {
    background:#c9a85d;
    padding:15px 30px;
    color:#000;
    text-decoration:none;
}

.section {
    padding:80px 20px;
    text-align:center;
}

.cards {
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:30px;
}

.card {
    background:#111;
    padding:30px;
    cursor:pointer;
}

.card:hover {
    border:1px solid #c9a85d;
}

/* POPUP */
#popup {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    z-index:999;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#imagem {
    width:80%;
    border-radius:10px;
    margin-top:15px;
}

iframe {
    width:80%;
    height:300px;
    border-radius:10px;
}

/* efeito luz */
#overlayLuz {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    opacity:0;
    pointer-events:none;
    transition:opacity 2s ease;
    z-index:998;
}

</style>
</head>

<body>

<div class="hero">
    <h1>Domus Prime</h1>
    <p>Automação residencial premium</p>
    <a class="btn" href="https://wa.me/5511987251715">Solicitar Projeto</a>
</div>

<div class="section">
    <h2 style="color:#c9a85d;">Ambientes</h2>

    <div class="cards">
        <div class="card" onclick="abrir('cinema')">Experiência Cinematográfica</div>
        <div class="card" onclick="abrir('controle')">Controle pelo Celular</div>
        <div class="card" onclick="abrir('persiana')">Persianas Automatizadas</div>
    </div>
</div>

<!-- POPUP -->
<div id="popup">

    <h2 id="titulo"></h2>

    <iframe id="video" frameborder="0" allowfullscreen></iframe>

    <img id="imagem">

    <p id="descricao"></p>

    <a id="whats" class="btn" target="_blank">Solicitar Projeto</a>

    <button onclick="fechar()" style="margin-top:20px;">Fechar</button>

</div>

<div id="overlayLuz"></div>

<script>
function abrir(tipo){

    const popup = document.getElementById("popup");
    const titulo = document.getElementById("titulo");
    const video = document.getElementById("video");
    const imagem = document.getElementById("imagem");
    const descricao = document.getElementById("descricao");
    const overlay = document.getElementById("overlayLuz");

    if(tipo === "cinema"){
        titulo.innerText = "Experiência Cinematográfica";

        overlay.style.opacity = "0.8";

        setTimeout(() => {
            video.src = "https://www.youtube.com/embed/6v2L2UGZJAM?autoplay=1";
        }, 1200);

        imagem.src = "https://images.unsplash.com/photo-1593784991095-a205069470b6";

        descricao.innerText = "Projetor embutido descendo automaticamente, iluminação cênica e controle completo por tablet na parede.";
    }

    if(tipo === "controle"){
        titulo.innerText = "Controle Inteligente";

        video.src = "https://www.youtube.com/embed/ysz5S6PUM-U";

        imagem.src = "https://images.unsplash.com/photo-1558002038-1055907df827";

        descricao.innerText = "Controle total da sua casa através do celular ou comando de voz.";
    }

    if(tipo === "persiana"){
        titulo.innerText = "Persianas Automatizadas";

        video.src = "https://www.youtube.com/embed/aqz-KE-bpKQ";

        imagem.src = "https://images.unsplash.com/photo-1505691723518-36a5ac3be353";

        descricao.innerText = "Abertura e fechamento automático com integração total ao sistema.";
    }

    document.getElementById("whats").href =
    "https://wa.me/5511987251715?text=Quero%20automatizar%20minha%20casa";

    popup.style.display = "flex";
}

function fechar(){
    document.getElementById("popup").style.display = "none";
    document.getElementById("video").src = "";
    document.getElementById("overlayLuz").style.opacity = "0";
}
</script>

</body>
</html>
