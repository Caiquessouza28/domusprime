<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOMUS PRIME | Smart Home</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b0b;
  color:white;
}

/* HEADER */
header {
  text-align:center;
  padding:60px 20px;
  background:#111;
}

h1 {
  font-size:40px;
  letter-spacing:2px;
}

.prime {
  color:#00e676;
}

/* LAYOUT CASA */
.house {
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:15px;
  max-width:600px;
  margin:30px auto;
}

.room {
  background:#1a1a1a;
  border-radius:12px;
  padding:20px;
  text-align:center;
  position:relative;
  transition:0.3s;
  cursor:pointer;
}

.room.active {
  background:#00c85333;
  box-shadow:0 0 20px #00c85355;
}

/* LUZ VISUAL */
.light {
  position:absolute;
  top:10px;
  right:10px;
  width:15px;
  height:15px;
  border-radius:50%;
  background:#444;
}

.room.active .light {
  background:#00e676;
  box-shadow:0 0 10px #00e676;
}

/* SWITCH */
.switch {
  margin-top:10px;
  padding:8px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#333;
  color:white;
}

.switch.on {
  background:#00c853;
}

/* PAINEL */
.panel {
  text-align:center;
  margin-top:20px;
}

.btn {
  background:#00c853;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>DOMUS <span class="prime">PRIME</span></h1>
<p>Painel inteligente estilo Smart Home</p>
</header>

<!-- CASA (MAPA) -->
<div class="house">

<div class="room" id="sala">
<div class="light"></div>
<h3>Sala</h3>
<button class="switch" onclick="toggle('sala')">Luz</button>
</div>

<div class="room" id="quarto">
<div class="light"></div>
<h3>Quarto</h3>
<button class="switch" onclick="toggle('quarto')">Luz</button>
</div>

<div class="room" id="cozinha">
<div class="light"></div>
<h3>Cozinha</h3>
<button class="switch" onclick="toggle('cozinha')">Luz</button>
</div>

<div class="room" id="cinema">
<div class="light"></div>
<h3>Cinema</h3>
<button class="switch" onclick="toggle('cinema')">Modo Cinema</button>
</div>

</div>

<!-- PAINEL -->
<div class="panel">
<h3>💰 Orçamento estimado</h3>
<p id="valor">R$ 2000</p>

<button class="btn" onclick="calc()">Atualizar valor</button>
<br><br>

<button class="btn" onclick="whats()">📲 Enviar projeto</button>
</div>

<script>

let state = {
  sala:false,
  quarto:false,
  cozinha:false,
  cinema:false
};

function toggle(room){
  state[room] = !state[room];

  const el = document.getElementById(room);
  const btn = el.querySelector("button");

  if(state[room]){
    el.classList.add("active");
    btn.classList.add("on");
  } else {
    el.classList.remove("active");
    btn.classList.remove("on");
  }

  calc();
}

function calc(){
  let base = 2000;

  if(state.sala) base += 1000;
  if(state.quarto) base += 800;
  if(state.cozinha) base += 900;
  if(state.cinema) base += 3000;

  document.getElementById("valor").innerText = "R$ " + base;
}

function whats(){
  const numero = "SEU_NUMERO";

  const msg =
`Projeto DOMUS PRIME:

Status da casa:
- Sala: ${state.sala}
- Quarto: ${state.quarto}
- Cozinha: ${state.cozinha}
- Cinema: ${state.cinema}

Valor estimado: ${document.getElementById("valor").innerText}

Quero esse sistema instalado.`;

  window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`, "_blank");
}

</script>

</body>
</html>
