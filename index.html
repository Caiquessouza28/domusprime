<div class="cards">

<div class="card" onclick="abrirPopup('luz')">
    <h3>Iluminação Inteligente</h3>
    <p>Cenários personalizados que transformam ambientes.</p>
</div>

<div class="card" onclick="abrirPopup('cinema')">
    <h3>Home Cinema</h3>
    <p>Experiência imersiva com automação completa.</p>
</div>

<div class="card" onclick="abrirPopup('seguranca')">
    <h3>Segurança</h3>
    <p>Proteção inteligente integrada à sua rotina.</p>
</div>

<div class="card" onclick="abrirPopup('controle')">
    <h3>Controle Total</h3>
    <p>Gerencie tudo pelo celular ou voz.</p>
</div>

</div>

<!-- POPUP -->
<div id="popup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); justify-content:center; align-items:center; flex-direction:column; z-index:999;">
    
    <h2 id="tituloPopup" style="color:#c9a85d;"></h2>
    
    <img id="imgPopup" style="max-width:90%; max-height:70%; border-radius:10px; margin:20px 0;">
    
    <button onclick="fecharPopup()" style="padding:10px 25px; background:#c9a85d; border:none; cursor:pointer;">
        Fechar
    </button>

</div>

<script>
function abrirPopup(tipo) {

    const popup = document.getElementById("popup");
    const img = document.getElementById("imgPopup");
    const titulo = document.getElementById("tituloPopup");

    if(tipo === "luz"){
        img.src = "https://images.unsplash.com/photo-1507089947368-19c1da9775ae";
        titulo.innerText = "Iluminação Inteligente";
    }

    if(tipo === "cinema"){
        img.src = "https://images.unsplash.com/photo-1587825140708-dfaf72ae4b04";
        titulo.innerText = "Home Cinema";
    }

    if(tipo === "seguranca"){
        img.src = "https://images.unsplash.com/photo-1581090700227-1e37b190418e";
        titulo.innerText = "Segurança Residencial";
    }

    if(tipo === "controle"){
        img.src = "https://images.unsplash.com/photo-1558002038-1055907df827";
        titulo.innerText = "Controle Inteligente";
    }

    popup.style.display = "flex";
}

function fecharPopup(){
    document.getElementById("popup").style.display = "none";
}
</script>
