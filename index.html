<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Domus Prime</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #0a0a0a;
    color: #fff;
    font-family: 'Inter', sans-serif;
}

.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.95)),
    url('https://images.unsplash.com/photo-1600607687939-ce8a6c25118c') center/cover;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero h1 {
    font-size: 55px;
    color: #c9a85d;
}

.btn {
    background: #c9a85d;
    padding: 15px 30px;
    color: #000;
    text-decoration: none;
}

.section {
    padding: 80px 20px;
    text-align: center;
}

.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 30px;
}

.card {
    background: #111;
    padding: 30px;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    border: 1px solid #c9a85d;
}

/* POPUP */
#popup {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    z-index:999;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#imagemGrande {
    width:80%;
    max-height:70vh;
    object-fit:cover;
    border-radius:10px;
}

.navBtn {
    margin:10px;
    padding:10px 20px;
    background:#c9a85d;
    border:none;
    cursor:pointer;
}

.closeBtn {
    margin-top:20px;
    background:#333;
    color:#fff;
    padding:10px 20px;
    border:none;
}
</style>
</head>

<body>

<div class="hero">
    <h1>Domus Prime</h1>
    <p>Automação residencial premium</p>
    <a class="btn" href="https://wa.me/5511987251715">Solicitar Projeto</a>
</div>

<div class="section">
    <h2 style="color:#c9a85d;">Ambientes</h2>

    <div class="cards">
        <div class="card" onclick="abrir('sala')">Sala Inteligente</div>
        <div class="card" onclick="abrir('quarto')">Quarto Automatizado</div>
        <div class="card" onclick="abrir('cozinha')">Cozinha Inteligente</div>
    </div>
</div>

<!-- POPUP -->
<div id="popup">
    <h2 id="titulo"></h2>

    <img id="imagemGrande">

    <div>
        <button class="navBtn" onclick="voltar()">←</button>
        <button class="navBtn" onclick="avancar()">→</button>
    </div>

    <a id="whats" class="btn" target="_blank">Solicitar Projeto</a>

    <button class="closeBtn" onclick="fechar()">Fechar</button>
</div>

<script>
let imagens = [];
let index = 0;

function abrir(tipo){
    const popup = document.getElementById("popup");
    const titulo = document.getElementById("titulo");

    if(tipo === "sala"){
        titulo.innerText = "Sala Inteligente";
        imagens = [
            "https://images.unsplash.com/photo-1600607687939-ce8a6c25118c",
            "https://images.unsplash.com/photo-1586023492125-27b2c045efd7"
        ];
    }

    if(tipo === "quarto"){
        titulo.innerText = "Quarto Automatizado";
        imagens = [
            "https://images.unsplash.com/photo-1505693416388-ac5ce068fe85",
            "https://images.unsplash.com/photo-1600210492493-0946911123ea"
        ];
    }

    if(tipo === "cozinha"){
        titulo.innerText = "Cozinha Inteligente";
        imagens = [
            "https://images.unsplash.com/photo-1556911220-bff31c812dba",
            "https://images.unsplash.com/photo-1600585152220-90363fe7e115"
        ];
    }

    index = 0;
    atualizarImagem();

    document.getElementById("whats").href =
    "https://wa.me/5511987251715?text=Quero%20um%20projeto";

    popup.style.display = "flex";
}

function atualizarImagem(){
    document.getElementById("imagemGrande").src = imagens[index];
}

function avancar(){
    index = (index + 1) % imagens.length;
    atualizarImagem();
}

function voltar(){
    index = (index - 1 + imagens.length) % imagens.length;
    atualizarImagem();
}

function fechar(){
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
