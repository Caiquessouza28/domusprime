<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Inteligente 3.0</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle at top,#1b1b1b,#000);
  color:white;
}

/* HEADER */
header {
  padding:100px 20px;
  text-align:center;
  background:url('https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1600&q=80');
  background-size:cover;
  position:relative;
}

header::after {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.65);
}

header h1, header p {
  position:relative;
}

h1 { font-size:42px; }

.btn {
  background:linear-gradient(90deg,#00c853,#00e676);
  padding:14px 22px;
  border:none;
  color:white;
  font-size:15px;
  border-radius:10px;
  cursor:pointer;
  margin-top:10px;
}

section {
  padding:50px 20px;
  text-align:center;
}

.card {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:15px;
  padding:20px;
  margin:10px;
  width:250px;
}

.grid {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

/* INPUTS */
input, select {
  padding:12px;
  border-radius:8px;
  border:none;
  margin:5px;
  width:220px;
}

/* PAINEL */
.painel {
  background:rgba(0,255,120,0.08);
  border:1px solid rgba(0,255,120,0.2);
  padding:20px;
  border-radius:15px;
  display:inline-block;
}
</style>
</head>

<body>

<header>
<h1>Casa Inteligente 3.0</h1>
<p>Automação + IA + Orçamento automático</p>
<button class="btn" onclick="scrollToSim()">Começar Simulação</button>
</header>

<!-- PERFIL CLIENTE -->
<section>
<h2>👤 Crie seu perfil de casa</h2>

<input id="nome" placeholder="Seu nome">
<input id="whats" placeholder="Seu WhatsApp (DDD + número)">

<br>

<select id="tipoCasa">
<option value="basica">Casa Simples</option>
<option value="media">Casa Média</option>
<option value="luxo">Casa de Alto Padrão</option>
</select>

<br><br>

<button class="btn" onclick="iniciar()">Iniciar Simulação</button>
</section>

<!-- SIMULAÇÃO -->
<section id="simulador" style="display:none">

<h2>🏠 Simulação Inteligente</h2>

<div class="grid">

<div class="card">
<h3>💡 Luzes</h3>
<p id="luz">OFF</p>
<button class="btn" onclick="toggle('luz')">Alternar</button>
</div>

<div class="card">
<h3>🎬 Cinema</h3>
<p id="cinema">OFF</p>
<button class="btn" onclick="toggle('cinema')">Ativar</button>
</div>

<div class="card">
<h3>🔊 Som</h3>
<p id="som">OFF</p>
<button class="btn" onclick="toggle('som')">Alternar</button>
</div>

<div class="card">
<h3>❄️ Clima</h3>
<p id="temp">24°C</p>
<button class="btn" onclick="temp()">Ajustar</button>
</div>

</div>

<br>

<div class="painel">
<h3>💰 Orçamento inteligente</h3>
<p id="valor">R$ 0</p>
</div>

<br><br>

<button class="btn" onclick="gerar()">Gerar proposta IA</button>
<button class="btn" onclick="enviar()">Enviar WhatsApp</button>

</section>

<script>

let estado = {
  luz:false,
  cinema:false,
  som:false,
  temp:24,
  tipo:"basica"
};

function iniciar(){
  estado.tipo = document.getElementById("tipoCasa").value;
  document.getElementById("simulador").style.display = "block";
  atualizar();
}

function toggle(item){
  estado[item] = !estado[item];
  document.getElementById(item).innerText = estado[item] ? "ON" : "OFF";
  atualizar();
}

function temp(){
  estado.temp--;
  document.getElementById("temp").innerText = estado.temp + "°C";
  atualizar();
}

/* IA DE PREÇO */
function atualizar(){
  let base = 1500;

  if(estado.tipo === "media") base = 3000;
  if(estado.tipo === "luxo") base = 6000;

  if(estado.luz) base += 1200;
  if(estado.cinema) base += 3500;
  if(estado.som) base += 2000;
  if(estado.temp < 22) base += 1000;

  document.getElementById("valor").innerText = "R$ " + base;
}

function gerar(){
  alert("IA gerou sua proposta personalizada 🚀");
}

function enviar(){
  let nome = document.getElementById("nome").value;
  let whats = document.getElementById("whats").value;

  let msg =
`Olá, meu nome é ${nome}

Minha simulação:
- Tipo de casa: ${estado.tipo}
- Luzes: ${estado.luz}
- Cinema: ${estado.cinema}
- Som: ${estado.som}
- Temperatura: ${estado.temp}°C
- Valor estimado: ${document.getElementById("valor").innerText}

Quero esse projeto instalado.`;

  window.open(`https://wa.me/${whats}?text=${encodeURIComponent(msg)}`, "_blank");
}

function scrollToSim(){
  document.getElementById("simulador").scrollIntoView({behavior:"smooth"});
}

</script>

</body>
</html>
