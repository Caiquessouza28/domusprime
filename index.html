<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Domus Prime</title>

<!-- PWA -->
<meta name="theme-color" content="#0b0b0b">

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0b0b0b;
  color:#fff;
}

/* TOP APP BAR */
.topbar{
  padding:18px;
  background:#111;
  text-align:center;
  font-weight:bold;
  letter-spacing:2px;
  color:#d6b25e;
}

/* APP CONTAINER */
.app{
  padding:20px;
}

/* GRID AMBIENTES */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

/* CARD STYLE APP */
.card{
  background:#151515;
  border-radius:16px;
  padding:18px;
  position:relative;
  cursor:pointer;
  transition:0.25s;
  border:1px solid #222;
}

.card:active{
  transform:scale(0.97);
}

/* STATUS LIGHT */
.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#333;
  position:absolute;
  top:12px;
  right:12px;
}

.card.active{
  border:1px solid #d6b25e;
  box-shadow:0 0 18px #d6b25e33;
}

.card.active .dot{
  background:#d6b25e;
  box-shadow:0 0 10px #d6b25e;
}

/* BOTTOM BAR */
.bottombar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:12px;
  border-top:1px solid #222;
}

.btn{
  color:#d6b25e;
  font-size:12px;
  text-align:center;
}

/* CTA */
.cta{
  margin-top:20px;
  text-align:center;
}

button{
  background:#d6b25e;
  border:none;
  padding:12px 18px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
DOMUS PRIME
</div>

<div class="app">

<h3>🏠 Sua Casa Inteligente</h3>
<p style="color:#aaa;">Toque para controlar os ambientes</p>

<div class="grid">

<div class="card" onclick="toggle(this,'sala')">
<div class="dot"></div>
<h4>Sala</h4>
<p id="sala">OFF</p>
</div>

<div class="card" onclick="toggle(this,'quarto')">
<div class="dot"></div>
<h4>Quarto</h4>
<p id="quarto">OFF</p>
</div>

<div class="card" onclick="toggle(this,'cozinha')">
<div class="dot"></div>
<h4>Cozinha</h4>
<p id="cozinha">OFF</p>
</div>

<div class="card" onclick="toggle(this,'cinema')">
<div class="dot"></div>
<h4>Cinema</h4>
<p id="cinema">OFF</p>
</div>

</div>

<div class="cta">
<p style="color:#aaa;">Quer instalar esse sistema na sua casa?</p>
<button onclick="whats()">Agendar Consultoria</button>
</div>

</div>

<!-- bottom navigation -->
<div class="bottombar">
<div class="btn">Home</div>
<div class="btn">Ambientes</div>
<div class="btn">Cenas</div>
<div class="btn">Perfil</div>
</div>

<script>

let state = {
  sala:false,
  quarto:false,
  cozinha:false,
  cinema:false
};

/* TOGGLE APP */
function toggle(el,room){

  state[room] = !state[room];

  if(state[room]){
    el.classList.add("active");
    document.getElementById(room).innerText = "ON";
  }else{
    el.classList.remove("active");
    document.getElementById(room).innerText = "OFF";
  }
}

/* WHATSAPP FUNIL */
function whats(){

  const numero = "5511987251715";

  const msg =
`Olá Domus Prime,

Tenho interesse em uma consultoria de automação residencial.

Ambientes:
- Sala: ${state.sala}
- Quarto: ${state.quarto}
- Cozinha: ${state.cozinha}
- Cinema: ${state.cinema}

Quero instalar o sistema.`;

  window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`, "_blank");
}

</script>

</body>
</html>
