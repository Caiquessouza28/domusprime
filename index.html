<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOMUS PRIME | Luxury Smart Home</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#050505;
  color:#d6b25e;
}

/* HEADER LUXO */
header {
  padding:70px 20px;
  text-align:center;
  background:#000;
  border-bottom:1px solid #d6b25e33;
}

h1 {
  font-size:42px;
  letter-spacing:4px;
}

.gold {
  color:#d6b25e;
  text-shadow:0 0 10px #d6b25e55;
}

p {
  color:#c9a24a;
}

/* MAPA CASA */
.map {
  width:340px;
  height:430px;
  margin:40px auto;
  display:grid;
  grid-template-areas:
    "sala quarto"
    "cozinha cozinha"
    "cinema cinema";
  gap:12px;
}

/* CÔMODOS */
.room {
  background:#0d0d0d;
  border:1px solid #2a2a2a;
  border-radius:14px;
  padding:15px;
  cursor:pointer;
  position:relative;
  transition:0.3s;
}

/* GOLD ACTIVE */
.room.active {
  background:#111;
  border:1px solid #d6b25e;
  box-shadow:0 0 18px #d6b25e55;
}

/* LUZ */
.light {
  width:10px;
  height:10px;
  border-radius:50%;
  background:#333;
  position:absolute;
  top:10px;
  right:10px;
}

.room.active .light {
  background:#d6b25e;
  box-shadow:0 0 10px #d6b25e;
}

/* POSIÇÃO */
#sala { grid-area:sala; }
#quarto { grid-area:quarto; }
#cozinha { grid-area:cozinha; }
#cinema { grid-area:cinema; }

/* BOTÃO GOLD */
.btn {
  background:linear-gradient(90deg,#d6b25e,#b8923f);
  color:#000;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  margin-top:20px;
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.05);
  box-shadow:0 0 15px #d6b25e55;
}

/* PAINEL */
.panel {
  text-align:center;
  margin-top:20px;
}

#valor {
  font-size:22px;
  color:#d6b25e;
  font-weight:bold;
}

/* DIVISOR */
hr {
  border:0;
  height:1px;
  background:#d6b25e33;
  margin:30px auto;
  width:60%;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
<h1 class="gold">DOMUS PRIME</h1>
<p>Luxury Smart Home Automation System</p>
</header>

<hr>

<!-- MAPA -->
<div class="map">

<div class="room" id="sala" onclick="toggle('sala')">
<div class="light"></div>
<h3>Sala</h3>
</div>

<div class="room" id="quarto" onclick="toggle('quarto')">
<div class="light"></div>
<h3>Quarto</h3>
</div>

<div class="room" id="cozinha" onclick="toggle('cozinha')">
<div class="light"></div>
<h3>Cozinha</h3>
</div>

<div class="room" id="cinema" onclick="toggle('cinema')">
<div class="light"></div>
<h3>Cinema</h3>
</div>

</div>

<!-- PAINEL -->
<div class="panel">

<h3>💰 Projeto estimado</h3>
<p id="valor">R$ 2.500</p>

<button class="btn" onclick="whats()">Solicitar instalação</button>

</div>

<hr>

<script>

let state = {
  sala:false,
  quarto:false,
  cozinha:false,
  cinema:false
};

function toggle(room){
  state[room] = !state[room];

  const el = document.getElementById(room);

  if(state[room]){
    el.classList.add("active");
  } else {
    el.classList.remove("active");
  }

  calc();
}

function calc(){
  let base = 2500;

  if(state.sala) base += 1200;
  if(state.quarto) base += 900;
  if(state.cozinha) base += 1000;
  if(state.cinema) base += 4000;

  document.getElementById("valor").innerText = "R$ " + base;
}

function whats(){
  const numero = "SEU_NUMERO";

  const msg =
`DOMUS PRIME - Luxury Edition

Configuração:
- Sala: ${state.sala}
- Quarto: ${state.quarto}
- Cozinha: ${state.cozinha}
- Cinema: ${state.cinema}

Valor estimado: ${document.getElementById("valor").innerText}

Quero esse projeto premium instalado.`;

  window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`, "_blank");
}

</script>

</body>
</html>
