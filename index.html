<div class="cards">

<div class="card" onclick="abrirPopup('luz')">
    <h3>Iluminação Inteligente</h3>
    <p>Cenários personalizados que transformam ambientes.</p>
</div>

<div class="card" onclick="abrirPopup('cinema')">
    <h3>Home Cinema</h3>
    <p>Experiência imersiva com automação completa.</p>
</div>

<div class="card" onclick="abrirPopup('seguranca')">
    <h3>Segurança</h3>
    <p>Proteção inteligente integrada à sua rotina.</p>
</div>

<div class="card" onclick="abrirPopup('controle')">
    <h3>Controle Total</h3>
    <p>Gerencie tudo pelo celular ou voz.</p>
</div>

</div>

<!-- POPUP PREMIUM -->
<div id="popup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); justify-content:center; align-items:center; flex-direction:column; z-index:999; padding:20px; text-align:center;">
    
    <h2 id="tituloPopup" style="color:#c9a85d;"></h2>

    <iframe id="videoPopup" width="90%" height="300" style="border-radius:10px; margin:20px 0;" frameborder="0" allowfullscreen></iframe>

    <p id="descricaoPopup" style="max-width:600px;"></p>

    <a id="botaoVenda" href="#" target="_blank" 
       style="padding:15px 30px; background:#c9a85d; color:#000; text-decoration:none; font-weight:bold; margin-top:20px; border-radius:5px;">
       Solicitar Projeto
    </a>

    <br><br>

    <button onclick="fecharPopup()" style="padding:10px 25px; background:#333; color:#fff; border:none; cursor:pointer;">
        Fechar
    </button>

</div>

<script>
function abrirPopup(tipo) {

    const popup = document.getElementById("popup");
    const titulo = document.getElementById("tituloPopup");
    const video = document.getElementById("videoPopup");
    const descricao = document.getElementById("descricaoPopup");
    const botao = document.getElementById("botaoVenda");

    if(tipo === "luz"){
        titulo.innerText = "Iluminação Inteligente";
        video.src = "https://www.youtube.com/embed/2WcJQ1mU9zE";
        descricao.innerText = "Controle total da iluminação com cenários personalizados, conforto e sofisticação.";
    }

    if(tipo === "cinema"){
        titulo.innerText = "Home Cinema Automatizado";
        video.src = "https://www.youtube.com/embed/tgbNymZ7vqY";
        descricao.innerText = "Transforme sua sala em um cinema com automação completa de luz, som e imagem.";
    }

    if(tipo === "seguranca"){
        titulo.innerText = "Segurança Inteligente";
        video.src = "https://www.youtube.com/embed/aqz-KE-bpKQ";
        descricao.innerText = "Proteja sua residência com sistemas integrados de monitoramento e controle.";
    }

    if(tipo === "controle"){
        titulo.innerText = "Controle Total";
        video.src = "https://www.youtube.com/embed/ysz5S6PUM-U";
        descricao.innerText = "Controle toda sua casa pelo celular ou comando de voz com praticidade.";
    }

    botao.href = "https://wa.me/5511987251715?text=Olá,%20quero%20um%20projeto%20de%20automação";

    popup.style.display = "flex";
}

function fecharPopup(){
    document.getElementById("popup").style.display = "none";
    document.getElementById("videoPopup").src = "";
}
</script>
